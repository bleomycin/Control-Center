<div class="divide-y divide-gray-700">
    {% for el in email_links %}
    <div class="group" id="email-row-{{ el.pk }}">
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                    <button class="text-gray-500 hover:text-gray-300 flex-shrink-0 email-expand-btn"
                            onclick="var b=document.getElementById('email-body-{{ el.pk }}'),s=this.querySelector('svg');if(b.children.length){b.innerHTML='';s.classList.remove('rotate-90')}else{s.classList.add('rotate-90');htmx.ajax('GET','{% url 'email_links:email_body' el.pk %}',{target:'#email-body-{{ el.pk }}',swap:'innerHTML'})}">
                        <svg class="w-3.5 h-3.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </button>
                    <div class="min-w-0">
                        <span class="text-sm text-gray-200 truncate block">{{ el.subject|default:"(no subject)" }}{% if el.message_count > 1 %} <span class="text-xs text-gray-500">({{ el.message_count }})</span>{% endif %}</span>
                        <span class="text-xs text-gray-400">
                            {{ el.from_name|default:el.from_email }}{% if el.date %} &middot; {{ el.date|date:"M j, Y" }}{% endif %}
                        </span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3 flex-shrink-0">
                <a href="{{ el.web_url }}" target="_blank" rel="noopener"
                   class="text-xs text-blue-400 hover:text-blue-300 whitespace-nowrap hidden sm:inline"
                   title="Open in Gmail">
                    <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                </a>
                <button hx-post="{% url unlink_url_name entity_pk el.pk %}"
                        hx-target="#email-list"
                        hx-swap="innerHTML"
                        hx-confirm="Unlink this email?"
                        class="text-gray-500 hover:text-red-400 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity text-sm">
                    &times;
                </button>
            </div>
        </div>
        <div id="email-body-{{ el.pk }}" class="px-4"></div>
    </div>
    {% empty %}
    <p class="px-4 py-4 text-sm text-gray-500 text-center">No emails linked</p>
    {% endfor %}
</div>
