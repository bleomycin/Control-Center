{% if error %}
<div class="p-3 rounded-md bg-red-900/20 border border-red-700 text-sm text-red-300">
    {{ error }}
</div>
{% elif results %}
<div class="max-h-64 overflow-y-auto border border-gray-600 rounded-md divide-y divide-gray-700">
    {% for msg in results %}
    <form method="post" action="{{ link_url }}" class="hover:bg-gray-700/50 transition-colors">
        {% csrf_token %}
        <input type="hidden" name="message_id" value="{{ msg.id }}">
        <input type="hidden" name="subject" value="{{ msg.subject }}">
        <input type="hidden" name="from_name" value="{{ msg.from_name }}">
        <input type="hidden" name="from_email" value="{{ msg.from_email }}">
        <input type="hidden" name="date" value="{{ msg.date }}">
        <button type="submit"
                hx-post="{{ link_url }}"
                hx-target="#email-list"
                hx-swap="innerHTML"
                class="w-full text-left px-3 py-2">
            <div class="flex items-center justify-between">
                <div class="min-w-0 flex-1">
                    <p class="text-sm text-gray-200 truncate">{{ msg.subject|default:"(no subject)" }}</p>
                    <p class="text-xs text-gray-400 truncate">{{ msg.from_name|default:msg.from_email }}{% if msg.date %} &middot; {{ msg.date }}{% endif %}</p>
                    {% if msg.snippet %}<p class="text-xs text-gray-500 truncate mt-0.5">{{ msg.snippet|truncatechars:80 }}</p>{% endif %}
                </div>
                <span class="text-xs text-blue-400 hover:text-blue-300 ml-2 flex-shrink-0">Link</span>
            </div>
        </button>
    </form>
    {% endfor %}
</div>
{% elif results is not None %}
<p class="text-sm text-gray-500 py-2">No emails found</p>
{% endif %}
