<div class="group flex items-center hover:bg-gray-700/50 transition-colors {% if session and s.pk == session.pk %}bg-gray-700/50{% endif %} session-row"
     id="session-row-{{ s.pk }}"
     data-session-id="{{ s.pk }}"
     data-pinned="{{ s.is_pinned|yesno:'true,false' }}">
    {# Select checkbox - hidden unless select mode is active #}
    <div class="session-checkbox-wrap hidden pl-2 pr-1 py-2 shrink-0">
        <input type="checkbox" name="session-select" value="{{ s.pk }}"
               class="rounded border-gray-600 bg-gray-700 text-blue-500 focus:ring-blue-500 focus:ring-offset-0 w-3.5 h-3.5 cursor-pointer"
               onchange="updateSessionBulkCount()">
    </div>
    {# Drag handle - hidden in select mode #}
    <div class="drag-handle cursor-grab active:cursor-grabbing pl-1 pr-0 py-2 text-gray-600 hover:text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity shrink-0 select-none"
         title="Drag to reorder">
        <svg class="w-4 h-5" fill="currentColor" viewBox="0 0 24 24"><circle cx="9" cy="5" r="1.5"/><circle cx="15" cy="5" r="1.5"/><circle cx="9" cy="10" r="1.5"/><circle cx="15" cy="10" r="1.5"/><circle cx="9" cy="15" r="1.5"/><circle cx="15" cy="15" r="1.5"/><circle cx="9" cy="20" r="1.5"/><circle cx="15" cy="20" r="1.5"/></svg>
    </div>
    <a href="{{ s.get_absolute_url }}"
       class="flex-1 min-w-0 px-2 py-2 text-sm {% if session and s.pk == session.pk %}text-white{% else %}text-gray-400{% endif %}"
       id="session-link-{{ s.pk }}">
        <div class="truncate" id="session-title-{{ s.pk }}">{{ s.title }}</div>
        <div class="text-xs text-gray-600 mt-0.5">{{ s.updated_at|date:"M j, g:i A" }}</div>
    </a>
    <div class="flex items-center pr-1.5 shrink-0 gap-0">
        {# Pin toggle - always visible when pinned, hover-revealed otherwise #}
        <button type="button"
                class="p-1 transition-opacity {% if s.is_pinned %}text-amber-400 hover:text-amber-300{% else %}text-gray-600 hover:text-amber-400 opacity-0 group-hover:opacity-100{% endif %}"
                title="{% if s.is_pinned %}Unpin{% else %}Pin{% endif %}"
                onclick="toggleSessionPin({{ s.pk }})">
            {% if s.is_pinned %}
            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
            {% else %}
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
            {% endif %}
        </button>
        {# Rename & delete - hover revealed #}
        <button type="button" class="text-gray-600 hover:text-blue-400 p-1 opacity-0 group-hover:opacity-100 transition-opacity" title="Rename"
                onclick="startSidebarRename({{ s.pk }}, '{{ s.title|escapejs }}')">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        </button>
        <form hx-post="{% url 'assistant:delete_session' s.pk %}" hx-confirm="Delete this conversation?">
            <button type="submit" class="text-gray-600 hover:text-red-400 p-1 opacity-0 group-hover:opacity-100 transition-opacity" title="Delete">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </form>
    </div>
    <div id="session-rename-{{ s.pk }}" class="hidden flex-1 min-w-0 px-2 py-1.5">
        <input type="text" value="{{ s.title|escapejs }}"
               class="w-full bg-gray-700 border border-blue-500 rounded px-2 py-1 text-sm text-gray-200 focus:outline-none focus:ring-1 focus:ring-blue-500"
               onkeydown="if(event.key==='Enter'){event.preventDefault();submitSidebarRename({{ s.pk }})}else if(event.key==='Escape'){cancelSidebarRename({{ s.pk }})}"
               onblur="submitSidebarRename({{ s.pk }})">
    </div>
</div>
