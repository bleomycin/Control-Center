{% if error %}
<div class="p-3 rounded-md bg-red-900/20 border border-red-700 text-sm text-red-300">
    {{ error }}
</div>
{% elif results %}
{% if browsing %}<p class="text-xs text-gray-500 mb-1 px-1">Recent emails</p>{% endif %}
<div class="max-h-64 overflow-y-auto border border-gray-600 rounded-md divide-y divide-gray-700">
    {% for msg in results %}
    <button type="button"
            onclick="selectGmailThread('{{ msg.id }}', '{{ msg.subject|escapejs }}')"
            class="w-full text-left px-3 py-2 hover:bg-gray-700/50 transition-colors">
        <div class="flex items-center justify-between">
            <div class="min-w-0 flex-1">
                <p class="text-sm text-gray-200 truncate">
                    {{ msg.subject|default:"(no subject)" }}
                    {% if msg.message_count > 1 %}<span class="text-xs text-gray-500 ml-1">({{ msg.message_count }})</span>{% endif %}
                </p>
                <p class="text-xs text-gray-400 truncate">
                    {% if msg.message_count > 1 %}
                        {{ msg.participants|join:", " }}
                    {% else %}
                        {{ msg.from_name|default:msg.from_email }}
                    {% endif %}
                    {% if msg.date %} &middot; {{ msg.date }}{% endif %}
                </p>
                {% if msg.snippet %}<p class="text-xs text-gray-500 truncate mt-0.5">{{ msg.snippet|truncatechars:80 }}</p>{% endif %}
            </div>
            <span class="text-xs text-green-400 ml-2 flex-shrink-0">Select</span>
        </div>
    </button>
    {% endfor %}
    {% if next_page_token %}
    <div id="gmail-load-more">
        <button type="button"
                hx-get="{% url 'assistant:gmail_thread_search' %}?q={{ query|urlencode }}&label={{ label|urlencode }}&page_token={{ next_page_token|urlencode }}"
                hx-target="#gmail-load-more"
                hx-swap="outerHTML"
                class="w-full text-center px-3 py-2 text-xs text-gray-400 hover:text-gray-200 hover:bg-gray-700/50 transition-colors">
            Load more&hellip;
        </button>
    </div>
    {% endif %}
</div>
{% elif results is not None %}
<p class="text-sm text-gray-500 py-2">No emails found</p>
{% endif %}
