{% load humanize choice_labels %}
<tr id="condition-row-{{ condition.pk }}" class="hover:bg-gray-700/50 transition-colors">
    {% if not hide_checkboxes %}
    <td class="px-4 py-3 w-8">
        <input type="checkbox" name="selected" value="{{ condition.pk }}" class="rounded border-gray-600 bg-gray-700 text-blue-500 focus:ring-blue-500 focus:ring-offset-0">
    </td>
    {% endif %}
    <td class="px-4 py-3">
        <a href="{{ condition.get_absolute_url }}" class="text-sm font-medium text-blue-400 hover:text-blue-300">{{ condition.name }}</a>
        <p class="text-xs text-gray-400 truncate max-w-xs">{% if condition.icd_code %}ICD: {{ condition.icd_code }}{% endif %}</p>
    </td>
    <td class="px-4 py-3 text-sm text-gray-300 hidden sm:table-cell">{{ condition.get_severity_display|default:"-" }}</td>
    <td class="px-4 py-3 text-sm text-gray-300 hidden md:table-cell">{{ condition.diagnosed_date|date:"M j, Y"|default:"-" }}</td>
    <td class="px-4 py-3 hidden lg:table-cell">
        <select onchange="htmx.ajax('POST','{% url 'healthcare:condition_inline_status' condition.pk %}',{target:'#condition-row-{{ condition.pk }}',swap:'outerHTML',values:{'status':this.value,'csrfmiddlewaretoken':'{{ csrf_token }}'}})"
                class="bg-transparent border-0 text-xs cursor-pointer hover:text-white focus:ring-0 p-0 pr-6 -ml-1 rounded-full
                    {% if condition.status == 'active' %}text-green-300
                    {% elif condition.status == 'managed' %}text-blue-300
                    {% elif condition.status == 'resolved' %}text-gray-300
                    {% elif condition.status == 'monitoring' %}text-yellow-300
                    {% else %}text-gray-300{% endif %}">
            {% for val, label in condition.STATUS_CHOICES %}
            <option value="{{ val }}" {% if condition.status == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </td>
</tr>
