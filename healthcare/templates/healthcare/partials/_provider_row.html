{% load humanize choice_labels %}
<tr id="provider-row-{{ provider.pk }}" class="hover:bg-gray-700/50 transition-colors">
    {% if not hide_checkboxes %}
    <td class="px-4 py-3 w-8">
        <input type="checkbox" name="selected" value="{{ provider.pk }}" class="rounded border-gray-600 bg-gray-700 text-blue-500 focus:ring-blue-500 focus:ring-offset-0">
    </td>
    {% endif %}
    <td class="px-4 py-3">
        <a href="{{ provider.get_absolute_url }}" class="text-sm font-medium text-blue-400 hover:text-blue-300">{{ provider.name }}</a>
        <p class="text-xs text-gray-400 truncate max-w-xs">{{ provider.specialty|default:provider.practice_name }}</p>
    </td>
    <td class="px-4 py-3 text-sm text-gray-300 hidden sm:table-cell">{{ provider.provider_type|choice_label:"provider_type"|default:"-" }}</td>
    <td class="px-4 py-3 text-sm text-gray-300 hidden md:table-cell">{{ provider.phone|default:"-" }}</td>
    <td class="px-4 py-3 hidden lg:table-cell">
        <select onchange="htmx.ajax('POST','{% url 'healthcare:provider_inline_status' provider.pk %}',{target:'#provider-row-{{ provider.pk }}',swap:'outerHTML',values:{'status':this.value,'csrfmiddlewaretoken':'{{ csrf_token }}'}})"
                class="bg-transparent border-0 text-xs cursor-pointer hover:text-white focus:ring-0 p-0 pr-6 -ml-1 rounded-full
                    {% if provider.status == 'active' %}text-green-300
                    {% elif provider.status == 'inactive' %}text-yellow-300
                    {% elif provider.status == 'past' %}text-gray-300
                    {% else %}text-gray-300{% endif %}">
            {% for val, label in provider.STATUS_CHOICES %}
            <option value="{{ val }}" {% if provider.status == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </td>
</tr>
