{% load humanize choice_labels %}
<tr id="advice-row-{{ adv.pk }}" class="hover:bg-gray-700/50 transition-colors">
    {% if not hide_checkboxes %}
    <td class="px-4 py-3 w-8">
        <input type="checkbox" name="selected" value="{{ adv.pk }}" class="rounded border-gray-600 bg-gray-700 text-blue-500 focus:ring-blue-500 focus:ring-offset-0">
    </td>
    {% endif %}
    <td class="px-4 py-3">
        <a href="{{ adv.get_absolute_url }}" class="text-sm font-medium text-blue-400 hover:text-blue-300">{{ adv.title }}</a>
        <p class="text-xs text-gray-400 truncate max-w-xs">{{ adv.date|date:"M j, Y" }} — {{ adv.get_category_display }}</p>
    </td>
    <td class="px-4 py-3 text-sm text-gray-300 hidden sm:table-cell">{{ adv.given_by|default:"-" }}</td>
    <td class="px-4 py-3 hidden lg:table-cell">
        <select onchange="htmx.ajax('POST','{% url 'healthcare:advice_inline_status' adv.pk %}',{target:'#advice-row-{{ adv.pk }}',swap:'outerHTML',values:{'status':this.value,'csrfmiddlewaretoken':'{{ csrf_token }}'}})"
                class="bg-transparent border-0 text-xs cursor-pointer hover:text-white focus:ring-0 p-0 pr-6 -ml-1 rounded-full
                    {% if adv.status == 'active' %}text-green-300
                    {% elif adv.status == 'archived' %}text-gray-300
                    {% elif adv.status == 'superseded' %}text-yellow-300
                    {% else %}text-gray-300{% endif %}">
            {% for val, label in adv.STATUS_CHOICES %}
            <option value="{{ val }}" {% if adv.status == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </td>
</tr>
