<form hx-post="{{ link_url }}" hx-target="#{{ list_id }}" hx-swap="innerHTML"
      class="px-4 py-3 border-b border-gray-700 bg-gray-800/50">
    {% csrf_token %}
    <div class="flex items-center gap-2">
        <div class="flex-1">{{ form.item }}</div>
        <button type="submit" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs rounded transition-colors">Link</button>
        <button type="button" onclick="this.closest('form').remove()" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs rounded transition-colors">Cancel</button>
    </div>
</form>
