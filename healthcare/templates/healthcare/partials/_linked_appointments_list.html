<div class="divide-y divide-gray-700">
    {% for appt in items %}
    <div class="flex items-center justify-between px-4 py-3 group hover:bg-gray-700/50">
        <a href="{{ appt.get_absolute_url }}" class="text-sm text-gray-200 hover:text-blue-400 truncate">{{ appt.title }}</a>
        <div class="flex items-center gap-3 shrink-0">
            <span class="text-xs text-gray-400">{{ appt.date|date:"M j" }}{% if appt.time %} {{ appt.time|time:"g:i A" }}{% endif %}</span>
            <span class="text-xs {% if appt.status == 'scheduled' %}text-blue-400{% elif appt.status == 'confirmed' %}text-green-400{% elif appt.status == 'cancelled' %}text-red-400{% elif appt.status == 'rescheduled' %}text-yellow-400{% else %}text-gray-400{% endif %}">{{ appt.get_status_display }}</span>
            <button hx-post="{% url unlink_url_name parent_pk appt.pk %}"
                    hx-target="#appointment-list" hx-swap="innerHTML"
                    hx-confirm="Unlink this appointment?"
                    class="text-red-400 hover:text-red-300 opacity-0 group-hover:opacity-100 text-xs transition-opacity">Unlink</button>
        </div>
    </div>
    {% empty %}
    <p class="px-4 py-4 text-sm text-gray-500 text-center">None</p>
    {% endfor %}
</div>
