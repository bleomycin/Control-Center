<div class="divide-y divide-gray-700">
    {% for tr in items %}
    <div class="flex items-center justify-between px-4 py-3 group hover:bg-gray-700/50">
        <a href="{{ tr.get_absolute_url }}" class="text-sm text-gray-200 hover:text-blue-400 truncate">{{ tr.test_name }}</a>
        <div class="flex items-center gap-3 shrink-0">
            <span class="text-xs text-gray-400">{{ tr.date|date:"M j" }}</span>
            <span class="text-xs {% if tr.status == 'normal' %}text-green-400{% elif tr.status == 'abnormal' %}text-yellow-400{% elif tr.status == 'critical' %}text-red-400{% elif tr.status == 'pending' %}text-blue-400{% else %}text-gray-400{% endif %}">{{ tr.get_status_display }}</span>
            <button hx-post="{% url unlink_url_name parent_pk tr.pk %}"
                    hx-target="#testresult-list" hx-swap="innerHTML"
                    hx-confirm="Unlink this test result?"
                    class="text-red-400 hover:text-red-300 opacity-0 group-hover:opacity-100 text-xs transition-opacity">Unlink</button>
        </div>
    </div>
    {% empty %}
    <p class="px-4 py-4 text-sm text-gray-500 text-center">None</p>
    {% endfor %}
</div>
