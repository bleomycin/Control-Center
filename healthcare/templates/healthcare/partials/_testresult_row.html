{% load humanize choice_labels %}
<tr id="testresult-row-{{ result.pk }}" class="hover:bg-gray-700/50 transition-colors">
    {% if not hide_checkboxes %}
    <td class="px-4 py-3 w-8">
        <input type="checkbox" name="selected" value="{{ result.pk }}" class="rounded border-gray-600 bg-gray-700 text-blue-500 focus:ring-blue-500 focus:ring-offset-0">
    </td>
    {% endif %}
    <td class="px-4 py-3">
        <a href="{{ result.get_absolute_url }}" class="text-sm font-medium text-blue-400 hover:text-blue-300">{{ result.test_name }}</a>
        <p class="text-xs text-gray-400 truncate max-w-xs">{{ result.date|date:"M j, Y" }}</p>
    </td>
    <td class="px-4 py-3 text-sm text-gray-300 hidden sm:table-cell">{{ result.test_type|choice_label:"test_type"|default:"-" }}</td>
    <td class="px-4 py-3 text-sm text-gray-300 hidden md:table-cell">{{ result.result_value|default:"-" }}</td>
    <td class="px-4 py-3 hidden lg:table-cell">
        <select onchange="htmx.ajax('POST','{% url 'healthcare:testresult_inline_status' result.pk %}',{target:'#testresult-row-{{ result.pk }}',swap:'outerHTML',values:{'status':this.value,'csrfmiddlewaretoken':'{{ csrf_token }}'}})"
                class="bg-transparent border-0 text-xs cursor-pointer hover:text-white focus:ring-0 p-0 pr-6 -ml-1 rounded-full
                    {% if result.status == 'normal' %}text-green-300
                    {% elif result.status == 'abnormal' %}text-yellow-300
                    {% elif result.status == 'critical' %}text-red-300
                    {% elif result.status == 'pending' %}text-blue-300
                    {% elif result.status == 'inconclusive' %}text-gray-300
                    {% else %}text-gray-300{% endif %}">
            {% for val, label in result.STATUS_CHOICES %}
            <option value="{{ val }}" {% if result.status == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </td>
</tr>
