{% load humanize choice_labels %}
<tr id="appointment-row-{{ appt.pk }}" class="hover:bg-gray-700/50 transition-colors">
    {% if not hide_checkboxes %}
    <td class="px-4 py-3 w-8">
        <input type="checkbox" name="selected" value="{{ appt.pk }}" class="rounded border-gray-600 bg-gray-700 text-blue-500 focus:ring-blue-500 focus:ring-offset-0">
    </td>
    {% endif %}
    <td class="px-4 py-3">
        <a href="{{ appt.get_absolute_url }}" class="text-sm font-medium text-blue-400 hover:text-blue-300">{{ appt.title }}</a>
        <p class="text-xs text-gray-400 truncate max-w-xs">{{ appt.date|date:"M j, Y" }}{% if appt.time %} at {{ appt.time|time:"g:i A" }}{% endif %}</p>
    </td>
    <td class="px-4 py-3 text-sm text-gray-300 hidden sm:table-cell">{{ appt.provider|default:"-" }}</td>
    <td class="px-4 py-3 text-sm text-gray-300 hidden md:table-cell">{{ appt.get_visit_type_display|default:"-" }}</td>
    <td class="px-4 py-3 hidden lg:table-cell">
        <select onchange="htmx.ajax('POST','{% url 'healthcare:appointment_inline_status' appt.pk %}',{target:'#appointment-row-{{ appt.pk }}',swap:'outerHTML',values:{'status':this.value,'csrfmiddlewaretoken':'{{ csrf_token }}'}})"
                class="bg-transparent border-0 text-xs cursor-pointer hover:text-white focus:ring-0 p-0 pr-6 -ml-1 rounded-full
                    {% if appt.status == 'scheduled' %}text-blue-300
                    {% elif appt.status == 'confirmed' %}text-green-300
                    {% elif appt.status == 'completed' %}text-gray-300
                    {% elif appt.status == 'cancelled' %}text-red-300
                    {% elif appt.status == 'no_show' %}text-orange-300
                    {% elif appt.status == 'rescheduled' %}text-yellow-300
                    {% else %}text-gray-300{% endif %}">
            {% for val, label in appt.STATUS_CHOICES %}
            <option value="{{ val }}" {% if appt.status == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </td>
</tr>
