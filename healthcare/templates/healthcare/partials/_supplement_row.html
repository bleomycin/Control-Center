{% load humanize choice_labels %}
<tr id="supplement-row-{{ supplement.pk }}" class="hover:bg-gray-700/50 transition-colors">
    {% if not hide_checkboxes %}
    <td class="px-4 py-3 w-8">
        <input type="checkbox" name="selected" value="{{ supplement.pk }}" class="rounded border-gray-600 bg-gray-700 text-blue-500 focus:ring-blue-500 focus:ring-offset-0">
    </td>
    {% endif %}
    <td class="px-4 py-3">
        <a href="{{ supplement.get_absolute_url }}" class="text-sm font-medium text-blue-400 hover:text-blue-300">{{ supplement.name }}</a>
        <p class="text-xs text-gray-400 truncate max-w-xs">{{ supplement.brand|default:"" }} {{ supplement.dosage|default:"" }}</p>
    </td>
    <td class="px-4 py-3 text-sm text-gray-300 hidden sm:table-cell">{{ supplement.get_frequency_display|default:"-" }}</td>
    <td class="px-4 py-3 hidden lg:table-cell">
        <select onchange="htmx.ajax('POST','{% url 'healthcare:supplement_inline_status' supplement.pk %}',{target:'#supplement-row-{{ supplement.pk }}',swap:'outerHTML',values:{'status':this.value,'csrfmiddlewaretoken':'{{ csrf_token }}'}})"
                class="bg-transparent border-0 text-xs cursor-pointer hover:text-white focus:ring-0 p-0 pr-6 -ml-1 rounded-full
                    {% if supplement.status == 'active' %}text-green-300
                    {% elif supplement.status == 'paused' %}text-yellow-300
                    {% elif supplement.status == 'discontinued' %}text-gray-300
                    {% else %}text-gray-300{% endif %}">
            {% for val, label in supplement.STATUS_CHOICES %}
            <option value="{{ val }}" {% if supplement.status == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </td>
</tr>
