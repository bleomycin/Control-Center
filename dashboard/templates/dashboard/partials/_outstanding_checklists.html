<div class="bg-gray-800 rounded-lg border border-gray-700">
    <div class="px-4 py-3 border-b border-gray-700 flex items-center justify-between">
        <h2 class="text-sm font-semibold text-emerald-400 uppercase tracking-wide">Outstanding Checklists</h2>
        <span class="text-xs bg-emerald-900/50 text-emerald-300 px-2 py-0.5 rounded-full">{{ outstanding_checklists|length }}</span>
    </div>
    <div class="divide-y divide-gray-700">
        {% for cl in outstanding_checklists %}
        <a href="{{ cl.get_absolute_url }}" class="flex items-center justify-between px-4 py-3 hover:bg-gray-700/50 transition-colors">
            <div class="min-w-0">
                <p class="text-sm text-gray-200 truncate">{{ cl.name }}</p>
                <p class="text-xs text-gray-400">{{ cl.remaining }} of {{ cl.total_items }} remaining</p>
            </div>
            <div class="text-right flex-shrink-0 ml-3">
                {% if cl.due_date %}
                <p class="text-xs {% if cl.is_overdue %}text-red-400{% elif cl.is_due_soon %}text-yellow-400{% else %}text-gray-400{% endif %}">{{ cl.due_date|date:"M j" }}</p>
                {% endif %}
                <div class="w-16 h-1.5 bg-gray-700 rounded-full overflow-hidden mt-1">
                    <div class="h-full bg-emerald-500 rounded-full" style="width: {% widthratio cl.done_items cl.total_items 100 %}%"></div>
                </div>
            </div>
        </a>
        {% empty %}
        <p class="px-4 py-6 text-sm text-gray-500 text-center">No outstanding checklists</p>
        {% endfor %}
    </div>
</div>
