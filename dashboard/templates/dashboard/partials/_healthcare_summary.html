{% if upcoming_appointments %}
<div class="bg-gray-800 rounded-lg border border-gray-700 p-4 mb-6">
    <div class="flex items-center gap-2 mb-3">
        <svg class="w-5 h-5 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
        <h2 class="text-sm font-semibold text-gray-200 uppercase tracking-wide">Upcoming Appointments</h2>
        <span class="ml-auto text-xs text-gray-500">{{ upcoming_appointments|length }}</span>
    </div>
    <div class="space-y-1">
        {% for appt in upcoming_appointments|slice:":5" %}
        <a href="{{ appt.get_absolute_url }}" class="flex items-center justify-between px-3 py-2 rounded-md hover:bg-gray-700/50 transition-colors">
            <div class="flex items-center gap-2 min-w-0">
                <span class="text-xs text-gray-400 shrink-0">{{ appt.date|date:"M j" }}</span>
                <span class="text-sm text-gray-200 truncate">{{ appt.title }}</span>
            </div>
            {% if appt.provider %}
            <span class="text-xs text-gray-400 shrink-0 ml-2">{{ appt.provider.name }}</span>
            {% endif %}
        </a>
        {% endfor %}
    </div>
</div>
{% endif %}
