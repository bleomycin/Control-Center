<form hx-post="{% url 'legal:case_log_add' matter.pk %}" hx-target="#case-log-list" hx-swap="innerHTML"
      class="px-4 py-3 border-b border-gray-700 bg-gray-750">
    {% csrf_token %}
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-3 gap-y-2 mb-2">
        <div>
            <label for="{{ form.stakeholder.id_for_label }}" class="block text-xs font-medium text-gray-400 mb-0.5">Source (stakeholder)</label>
            {{ form.stakeholder }}
        </div>
        <div>
            <label for="{{ form.source_name.id_for_label }}" class="block text-xs font-medium text-gray-400 mb-0.5">Source (name, if not stakeholder)</label>
            {{ form.source_name }}
        </div>
    </div>
    <div class="mb-2">
        <label for="{{ form.text.id_for_label }}" class="block text-xs font-medium text-gray-400 mb-0.5">Entry</label>
        {{ form.text }}
    </div>
    <div class="flex gap-2">
        <button type="submit" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs font-medium rounded-md transition-colors">Add Entry</button>
        <button type="button" onclick="this.closest('form').remove()" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs font-medium rounded-md transition-colors">Cancel</button>
    </div>
</form>
