{% load choice_labels %}
<div class="divide-y divide-gray-700">
    {% for comm in communication_list %}
        {% include "legal/partials/_communication_row.html" %}
    {% empty %}
    <p class="px-4 py-4 text-sm text-gray-500 text-center">No communications found</p>
    {% endfor %}
</div>
{% if has_more %}
<div class="px-4 py-3 border-t border-gray-700 text-center">
    <button hx-get="{% url 'legal:communication_list' matter.pk %}"
            hx-target="#communication-list"
            hx-swap="innerHTML"
            hx-include="#comm-filter-form"
            hx-vals='{"comm_page": "{{ next_page }}"}'
            class="text-sm text-blue-400 hover:text-blue-300 transition-colors">
        Show more ({{ total_count }} total)
    </button>
</div>
{% endif %}
