<form hx-post="{% url 'legal:related_entity_link' matter.pk %}"
      hx-target="#related-entities-list"
      hx-swap="innerHTML"
      class="px-4 py-3 border-b border-gray-700 bg-gray-750">
    {% csrf_token %}
    <div class="flex flex-col sm:flex-row gap-2 sm:items-end">
        <div class="sm:w-40">
            <label class="block text-xs font-medium text-gray-400 mb-1">Type</label>
            <select name="entity_type"
                    hx-get="{% url 'legal:related_entity_options' matter.pk %}"
                    hx-target="#entity-select-container"
                    hx-swap="innerHTML"
                    hx-trigger="change"
                    hx-include="[name='entity_type']"
                    class="w-full bg-gray-700 border border-gray-600 rounded-md px-2.5 py-1.5 text-sm text-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                <option value="">Select type...</option>
                {% for key, label in type_choices %}
                <option value="{{ key }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex-1" id="entity-select-container">
            <label class="block text-xs font-medium text-gray-400 mb-1">Entity</label>
            <select name="entity_pk" disabled class="w-full bg-gray-700 border border-gray-600 rounded-md px-2.5 py-1.5 text-sm text-gray-400 focus:border-blue-500">
                <option value="">Select type first...</option>
            </select>
        </div>
        <div class="flex gap-2 flex-shrink-0">
            <button type="submit" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs font-medium rounded-md transition-colors">Link</button>
            <button type="button" onclick="this.closest('form').remove()" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs font-medium rounded-md transition-colors">Cancel</button>
        </div>
    </div>
</form>
