<div class="px-4 py-3 group hover:bg-gray-700/30 transition-colors">
    <div class="flex items-start justify-between gap-2">
        <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 text-xs text-gray-400 mb-1">
                <svg class="w-3.5 h-3.5 text-gray-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                <span class="text-xs px-1.5 py-0.5 rounded bg-gray-700 text-gray-400">log</span>
                <span>{{ log.created_at|date:"M j, Y g:i A" }}</span>
                {% if log.display_source %}
                <span class="text-gray-600">&middot;</span>
                {% if log.stakeholder %}
                <a href="{{ log.stakeholder.get_absolute_url }}" class="text-blue-400 hover:text-blue-300">{{ log.stakeholder.name }}</a>
                {% else %}
                <span class="text-gray-300">{{ log.source_name }}</span>
                {% endif %}
                {% endif %}
            </div>
            <p class="text-sm text-gray-200 whitespace-pre-wrap">{{ log.text }}</p>
        </div>
        <div class="flex items-center gap-2 sm:opacity-0 sm:group-hover:opacity-100 transition-all shrink-0 mt-0.5">
            <button hx-get="{% url 'legal:case_log_edit' log.pk %}"
                    hx-target="#activity-form-container"
                    hx-swap="innerHTML"
                    class="text-gray-500 hover:text-blue-400 text-xs">edit</button>
            <button hx-post="{% url 'legal:case_log_delete' log.pk %}"
                    hx-target="#activity-list" hx-swap="innerHTML"
                    hx-confirm="Delete this log entry?"
                    class="text-gray-500 hover:text-red-400 text-sm">&times;</button>
        </div>
    </div>
</div>
