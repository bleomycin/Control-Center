<form hx-post="{% if editing %}{% url 'legal:communication_edit' editing.pk %}{% else %}{% url 'legal:communication_add' matter.pk %}{% endif %}" hx-target="#communication-list" hx-swap="innerHTML"
      hx-encoding="multipart/form-data"
      class="px-4 py-4 border-b border-gray-700 bg-gray-750">
    {% csrf_token %}
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
        <div>
            <label for="{{ form.stakeholder.id_for_label }}" class="block text-xs font-medium text-gray-400 mb-1">Contact</label>
            {{ form.stakeholder }}
        </div>
        <div>
            <label for="{{ form.date.id_for_label }}" class="block text-xs font-medium text-gray-400 mb-1">Date</label>
            {{ form.date }}
        </div>
        <div>
            <label for="{{ form.direction.id_for_label }}" class="block text-xs font-medium text-gray-400 mb-1">Direction</label>
            {{ form.direction }}
        </div>
        <div>
            <label for="{{ form.method.id_for_label }}" class="block text-xs font-medium text-gray-400 mb-1">Method</label>
            {{ form.method }}
        </div>
        <div class="flex items-center gap-2 pt-5">
            {{ form.follow_up_needed }}
            <label for="{{ form.follow_up_needed.id_for_label }}" class="text-xs font-medium text-gray-400">Follow-up needed</label>
        </div>
        <div>
            <label for="{{ form.follow_up_date.id_for_label }}" class="block text-xs font-medium text-gray-400 mb-1">Follow-up date</label>
            {{ form.follow_up_date }}
        </div>
    </div>
    <div class="mb-3">
        <label for="{{ form.summary.id_for_label }}" class="block text-xs font-medium text-gray-400 mb-1">Summary</label>
        {{ form.summary }}
    </div>
    <div class="mb-3">
        <label class="block text-xs font-medium text-gray-400 mb-1">Attachment</label>
        {% if editing and editing.file %}
        <div class="flex items-center gap-2 mb-2">
            <a href="{{ editing.file.url }}" target="_blank" class="text-sm text-blue-400 hover:text-blue-300">{{ editing.file.name|cut:"communications/" }}</a>
            <label class="flex items-center gap-1 text-xs text-gray-400">
                <input type="checkbox" name="clear_file" value="1" class="rounded border-gray-600 bg-gray-700 text-red-500 focus:ring-red-500">
                Remove
            </label>
        </div>
        {% endif %}
        {{ form.file }}
    </div>
    <div class="flex gap-2">
        <button type="submit" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs font-medium rounded-md transition-colors">{% if editing %}Save Changes{% else %}Add Communication{% endif %}</button>
        <button type="button" onclick="this.closest('form').remove()" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs font-medium rounded-md transition-colors">Cancel</button>
    </div>
</form>
