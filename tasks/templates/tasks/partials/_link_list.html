{% for link in task.links.all %}
<div class="flex items-center justify-between px-4 py-2 hover:bg-gray-700/30 group">
    <a href="{{ link.url }}" target="_blank" rel="noopener" class="flex items-center gap-2 min-w-0 flex-1 text-sm text-blue-400 hover:text-blue-300">
        <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        <span class="truncate">{% if link.label %}{{ link.label }}{% else %}{{ link.url|truncatechars:60 }}{% endif %}</span>
    </a>
    <button hx-get="{% url 'tasks:link_edit' link.pk %}" hx-target="#task-links-list" hx-swap="innerHTML"
            class="text-gray-500 hover:text-blue-400 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity shrink-0 p-1" title="Edit">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
    </button>
    <button hx-post="{% url 'tasks:link_delete' link.pk %}" hx-target="#task-links-list" hx-swap="innerHTML"
            hx-confirm="Remove this link?"
            class="text-gray-600 hover:text-red-400 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity shrink-0 p-1" title="Delete">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
</div>
{% empty %}
<p class="px-4 py-3 text-sm text-gray-500">No links</p>
{% endfor %}
