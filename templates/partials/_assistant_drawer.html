<!-- Assistant Drawer Backdrop -->
<div id="drawer-backdrop" class="fixed inset-0 z-50 bg-black/50 hidden transition-opacity" onclick="closeDrawer()"></div>

<!-- Assistant Drawer Panel -->
<div id="assistant-drawer" class="fixed top-0 right-0 z-50 h-full w-full sm:w-96 lg:w-[28rem] bg-gray-900 border-l border-gray-700 transform translate-x-full transition-transform duration-200 flex flex-col">
    <!-- Header -->
    <div class="px-4 py-3 border-b border-gray-700 shrink-0 bg-gray-800/50">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2 min-w-0">
                <h2 class="text-sm font-semibold text-gray-200 shrink-0">Assistant</h2>
                <span id="drawer-session-title" class="text-xs text-gray-500 truncate hidden"></span>
            </div>
            <div class="flex items-center gap-1 shrink-0">
                <button onclick="drawerNewSession()" class="px-2 py-1 text-xs text-blue-400 hover:text-white hover:bg-blue-600/30 border border-blue-500/40 rounded-md flex items-center gap-1 transition-colors" title="New chat">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    <span>New</span>
                </button>
                <a href="/assistant/" class="p-1 text-gray-500 hover:text-gray-300 rounded transition-colors" title="Open full page">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                    </svg>
                </a>
                <button onclick="closeDrawer()" class="p-1 text-gray-400 hover:text-white rounded transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Messages -->
    <div id="drawer-scroll" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div id="drawer-empty-state" class="flex items-center justify-center h-full">
            <div class="text-center">
                <svg class="w-10 h-10 text-gray-600 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                </svg>
                <p class="text-xs text-gray-500">Ask anything about your data.</p>
            </div>
        </div>
        <div id="drawer-message-list"></div>
    </div>

    <!-- Input -->
    <div class="border-t border-gray-700 p-3 bg-gray-800/50 shrink-0">
        <!-- Page context indicator -->
        <div id="drawer-context-badge" class="hidden mb-2">
            <span class="text-xs text-gray-500 flex items-center gap-1">
                <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                </svg>
                <span id="drawer-context-label" class="truncate"></span>
            </span>
        </div>
        <form id="drawer-chat-form" class="flex gap-2">
            <textarea id="drawer-chat-input" rows="1" placeholder="Ask about your data..."
                      class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none"
                      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();document.getElementById('drawer-chat-form').dispatchEvent(new Event('submit'))}"
                      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
            <button type="submit" id="drawer-send-btn"
                    class="px-3 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-lg transition-colors shrink-0">
                Send
            </button>
        </form>
    </div>
</div>
