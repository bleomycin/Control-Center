<div class="divide-y divide-gray-700">
    {% for holder in policyholders %}
    <div class="px-4 py-3 group">
        <div class="flex items-center justify-between">
            <a href="{{ holder.stakeholder.get_absolute_url }}" class="text-sm text-blue-400 hover:text-blue-300">{{ holder.stakeholder.name }}</a>
            <button hx-post="{% url 'assets:policyholder_delete' holder.pk %}"
                    hx-target="#policyholder-list"
                    hx-swap="innerHTML"
                    hx-confirm="Remove this policyholder?"
                    class="text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity text-sm">
                &times;
            </button>
        </div>
        {% include "assets/partials/_inline_notes.html" with notes=holder.notes role=holder.role edit_url=holder.get_notes_url notes_id=holder.get_notes_id %}
    </div>
    {% empty %}
    <p class="px-4 py-4 text-sm text-gray-500 text-center">No policyholders assigned</p>
    {% endfor %}
</div>
