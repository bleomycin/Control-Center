<div id="{{ notes_id }}">
<form hx-post="{{ save_url }}"
      hx-target="#{{ notes_id }}"
      hx-swap="outerHTML"
      class="mt-1 space-y-2">
    {% csrf_token %}
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
        <div>
            <label class="block text-xs text-gray-500 mb-0.5">Role</label>
            <input type="text" name="role" value="{{ role }}"
                   class="w-full rounded-md border-gray-600 bg-gray-700 text-gray-200 text-xs px-2 py-1 focus:border-blue-500 focus:ring-blue-500">
        </div>
        {% if has_percentage %}
        <div>
            <label class="block text-xs text-gray-500 mb-0.5">Ownership %</label>
            <input type="number" name="ownership_percentage" value="{{ ownership_percentage|default_if_none:'' }}" step="0.01" min="0" max="100"
                   class="w-full rounded-md border-gray-600 bg-gray-700 text-gray-200 text-xs px-2 py-1 focus:border-blue-500 focus:ring-blue-500">
        </div>
        {% endif %}
    </div>
    <div>
        <label class="block text-xs text-gray-500 mb-0.5">Notes</label>
        <textarea name="notes" rows="2"
                  class="w-full rounded-md border-gray-600 bg-gray-700 text-gray-200 text-xs px-2 py-1 focus:border-blue-500 focus:ring-blue-500 auto-grow-textarea">{{ notes }}</textarea>
    </div>
    <div class="flex gap-1.5">
        <button type="submit" class="px-2 py-0.5 bg-blue-600 hover:bg-blue-500 text-white text-xs rounded transition-colors">Save</button>
        <button type="button"
                hx-get="{{ save_url }}?display=1"
                hx-target="#{{ notes_id }}"
                hx-swap="outerHTML"
                class="px-2 py-0.5 bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs rounded transition-colors">Cancel</button>
    </div>
</form>
</div>
